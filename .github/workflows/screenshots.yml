name: Screenshots

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Allow the job to push the generated screenshots back to the PR branch.
permissions:
  contents: write

concurrency:
  group: screenshots-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  screenshots:
    name: Capture UI screenshots
    runs-on: ubuntu-latest
    # Don't run on forks (no write access / no secrets).
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run screenshot test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          disable-animations: true
          script: |
            adb uninstall com.gproust.sprout || true
            ./gradlew :app:connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=com.gproust.sprout.ScreenshotTest
            mkdir -p pulled
            adb pull /storage/emulated/0/Android/data/com.gproust.sprout/files/screenshots ./pulled || true

      - name: Collect screenshots
        run: |
          mkdir -p screenshots
          find ./pulled -name '*.png' -exec cp {} screenshots/ \;
          echo "Collected:" && ls -1 screenshots || true

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: screenshots/*.png
          if-no-files-found: warn

      - name: Commit screenshots to the PR branch
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit."
          else
            git commit -m "ci: update UI screenshots [skip ci]"
            git push origin HEAD:${{ github.head_ref }}
          fi
