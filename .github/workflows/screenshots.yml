name: Screenshots

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Allow the job to push the generated screenshots back to the PR branch.
# pull-requests: read lets the detect job list the PR's changed files.
permissions:
  contents: write
  pull-requests: read

concurrency:
  group: screenshots-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # Cheap gate (seconds): capture screenshots only when the PR changes
  # something that can affect the rendered UI. PRs touching only docs,
  # fastlane metadata, committed screenshots, or workflows skip the emulator
  # (~15 min) — the capture job then reports "skipped" and the workflow still
  # concludes success. Workflow edits don't re-capture either; validate those
  # with a manual run (workflow_dispatch always captures).
  changes:
    name: Detect UI changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - name: Check the PR's changed files
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        # UI-relevant: app code/resources and Gradle build files, except JVM
        # unit tests (app/src/test/**), which can't change what is rendered.
        run: |
          CHANGED=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --paginate --jq '.[].filename')
          printf 'Changed files:\n%s\n' "$CHANGED"
          if printf '%s\n' "$CHANGED" | grep -v '^app/src/test/' | grep -qE '^(app/|gradle/|(build|settings)\.gradle\.kts$|gradle\.properties$)'; then
            echo "ui=true" >> "$GITHUB_OUTPUT"
          else
            echo "ui=false" >> "$GITHUB_OUTPUT"
          fi

  screenshots:
    name: Capture UI screenshots
    runs-on: ubuntu-latest
    needs: changes
    # !cancelled() lets this run on workflow_dispatch, where `changes` is
    # skipped (a skipped need would otherwise auto-skip this job too).
    # Don't run on forks (no write access / no secrets).
    if: >-
      !cancelled() &&
      (github.event_name == 'workflow_dispatch' ||
       (needs.changes.outputs.ui == 'true' &&
        github.event.pull_request.head.repo.full_name == github.repository))

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          # head_ref is set for pull_request; fall back to ref_name for manual runs.
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build app + test APKs
        run: ./gradlew :app:assembleDebug :app:assembleDebugAndroidTest

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run screenshot test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          disable-animations: true
          # NOTE: android-emulator-runner runs each line in its own shell, so
          # multi-line constructs must stay on one line. We install + `am instrument`
          # (instead of Gradle's connectedAndroidTest, which uninstalls the app
          # afterwards and wipes the captured screenshots) so the app stays
          # installed and `run-as` can read its internal files.
          script: |
            adb install -r -t app/build/outputs/apk/debug/app-debug.apk
            adb install -r -t app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
            adb shell am instrument -w -e class com.gproust.sprout.ScreenshotTest com.gproust.sprout.test/androidx.test.runner.AndroidJUnitRunner
            mkdir -p screenshots
            for f in $(adb exec-out run-as com.gproust.sprout ls files/screenshots 2>/dev/null); do n=$(echo "$f" | tr -d '\r'); adb exec-out run-as com.gproust.sprout cat "files/screenshots/$n" > "screenshots/$n"; done
            ls -1 screenshots || true

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: screenshots/*.png
          if-no-files-found: warn

      - name: Commit screenshots to the PR branch
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        run: |
          find screenshots -type f ! -name '*.png' -delete || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A screenshots
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit."
          else
            git commit -m "ci: update UI screenshots [skip ci]"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi
