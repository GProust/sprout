name: Release

# Manual-only release workflow. Run it from the GitHub UI:
#   Actions -> Release -> Run workflow
# Optionally enter a tag (e.g. v1.0) to also publish a GitHub Release with the
# APK attached; leave it empty to just build and upload the artifacts. The Play
# Store upload itself is a manual step in the Play Console — see docs/RELEASING.md.
#
# Required repository secrets for a SIGNED build (Settings -> Secrets and
# variables -> Actions):
#   KEYSTORE_BASE64      base64 of your upload keystore: `base64 -w0 sprout-upload.jks`
#   KEYSTORE_PASSWORD    keystore (store) password
#   KEY_ALIAS            key alias
#   KEY_PASSWORD         key password
# Without these the job still runs but produces an UNSIGNED build.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish as a GitHub Release (e.g. v1.0). Leave empty to only build artifacts.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    env:
      # Map the secret to an env var so it can be checked in `if:` conditions
      # (the `secrets` context is NOT available inside `if:`).
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/sprout-upload.jks"

      - name: Build release (AAB + APK)
        env:
          SPROUT_KEYSTORE_FILE: ${{ runner.temp }}/sprout-upload.jks
          SPROUT_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SPROUT_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SPROUT_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease assembleRelease

      - name: Upload artifacts to the workflow run
        uses: actions/upload-artifact@v4
        with:
          name: sprout-release
          path: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: error

      - name: Create GitHub Release with the APK
        if: inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: app/build/outputs/apk/release/app-release*.apk
          generate_release_notes: true
