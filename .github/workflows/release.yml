name: Release

# Manual-only release workflow. Run it from the GitHub UI:
#   Actions -> Release -> Run workflow
# Enter a version (e.g. 1.3.0) to cut a release: if it differs from the
# current versionName, the workflow bumps versionName to it, increments
# versionCode by one, and pushes that commit to the branch first; it then
# builds from that commit, tags it with the version, and publishes a GitHub
# Release with the APK attached. Leave the version empty to only build and
# upload the artifacts (no commit, no tag, no release). The Play Store upload
# itself is a manual step in the Play Console — see docs/RELEASING.md.
#
# Required repository secrets for a SIGNED build (Settings -> Secrets and
# variables -> Actions):
#   KEYSTORE_BASE64      base64 of your upload keystore: `base64 -w0 sprout-upload.jks`
#   KEYSTORE_PASSWORD    keystore (store) password
#   KEY_ALIAS            key alias
#   KEY_PASSWORD         key password
# Without these the job still runs but produces an UNSIGNED build.
#
#   RELEASE_DEPLOY_KEY   private half of the repo's write deploy key; the
#                        version-bump commit is pushed to main over SSH with
#                        it because deploy keys are on the "Protect main"
#                        ruleset bypass list (GITHUB_TOKEN pushes are blocked
#                        by the changes-through-PRs rule).

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.3.0). Bumps versionName/versionCode + commits if needed, then tags and publishes a GitHub Release. Leave empty to only build artifacts.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    env:
      # Map the secret to an env var so it can be checked in `if:` conditions
      # (the `secrets` context is NOT available inside `if:`).
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Configures the origin remote over SSH, so the version-bump push
          # authenticates with the deploy key (ruleset bypass) instead of
          # GITHUB_TOKEN.
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}

      - name: Bump version if requested
        id: bump
        if: inputs.version != ''
        env:
          VERSION: ${{ inputs.version }}
        run: |
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]] || { echo "::error::'$VERSION' is not a valid version (expected e.g. 1.3.0)"; exit 1; }
          FILE=app/build.gradle.kts
          CURRENT_NAME=$(sed -n 's/^[[:space:]]*versionName = "\(.*\)".*/\1/p' "$FILE")
          CURRENT_CODE=$(sed -n 's/^[[:space:]]*versionCode = \([0-9]*\).*/\1/p' "$FILE")
          if [ -z "$CURRENT_NAME" ] || [ -z "$CURRENT_CODE" ]; then
            echo "::error::could not parse versionName/versionCode from $FILE"; exit 1
          fi
          if [ "$CURRENT_NAME" = "$VERSION" ]; then
            echo "versionName is already $VERSION (versionCode $CURRENT_CODE); nothing to bump."
          else
            NEW_CODE=$((CURRENT_CODE + 1))
            sed -i "s/^\([[:space:]]*\)versionCode = $CURRENT_CODE\$/\1versionCode = $NEW_CODE/" "$FILE"
            sed -i "s/^\([[:space:]]*\)versionName = \"$CURRENT_NAME\"\$/\1versionName = \"$VERSION\"/" "$FILE"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$FILE"
            git commit -m "chore: bump version to $VERSION (versionCode $NEW_CODE) [skip ci]"
            git push origin "HEAD:${{ github.ref_name }}"
            echo "Bumped $CURRENT_NAME (code $CURRENT_CODE) -> $VERSION (code $NEW_CODE)."
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/sprout-upload.jks"

      - name: Build release (AAB + APK)
        env:
          SPROUT_KEYSTORE_FILE: ${{ runner.temp }}/sprout-upload.jks
          SPROUT_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SPROUT_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SPROUT_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease assembleRelease

      - name: Upload artifacts to the workflow run
        uses: actions/upload-artifact@v4
        with:
          name: sprout-release
          path: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: error

      - name: Create GitHub Release with the APK
        if: inputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          # Tag the bump commit, not the commit the workflow started from.
          target_commitish: ${{ steps.bump.outputs.sha }}
          files: app/build/outputs/apk/release/app-release*.apk
          generate_release_notes: true
