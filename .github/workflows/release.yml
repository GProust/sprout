name: Release

# Builds signed release artifacts when a version tag (e.g. v1.0) is pushed,
# and attaches the APK to a GitHub Release. The Play Store upload itself is a
# manual step in the Play Console — see docs/RELEASING.md.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   KEYSTORE_BASE64      base64 of your upload keystore: `base64 -w0 sprout-upload.jks`
#   KEYSTORE_PASSWORD    keystore (store) password
#   KEY_ALIAS            key alias
#   KEY_PASSWORD         key password
# Without these the job still runs but produces an UNSIGNED build.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/sprout-upload.jks"

      - name: Build signed release (AAB + APK)
        env:
          SPROUT_KEYSTORE_FILE: ${{ runner.temp }}/sprout-upload.jks
          SPROUT_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SPROUT_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SPROUT_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease assembleRelease

      - name: Upload artifacts to the workflow run
        uses: actions/upload-artifact@v4
        with:
          name: sprout-release
          path: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: error

      - name: Create GitHub Release with the APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release*.apk
          generate_release_notes: true
