# F-Droid build recipe for Sprout.
#
# This file is NOT used by this repository. To get Sprout onto F-Droid, submit
# it (as metadata/com.gproust.sprout.yml) to the fdroiddata repository:
#   https://gitlab.com/fdroid/fdroiddata
# See docs/RELEASING.md §6 for the full submission steps.
#
# F-Droid builds from source on its own server and signs with its own key, so
# none of the SPROUT_* signing secrets are involved in the F-Droid build.

Categories:
  - Sports & Health
License: GPL-3.0-only
AuthorName: Guillaume Proust
AuthorEmail: guillaume.proust13@gmail.com
WebSite: https://github.com/GProust/sprout
SourceCode: https://github.com/GProust/sprout
IssueTracker: https://github.com/GProust/sprout/issues
Changelog: https://github.com/GProust/sprout/blob/main/CHANGELOG.md

RepoType: git
Repo: https://github.com/GProust/sprout.git

Builds:
  - versionName: "1.0"
    versionCode: 1
    commit: v1.0
    subdir: app
    gradle:
      - yes

AutoUpdateMode: Version v%v
UpdateCheckMode: Tags
CurrentVersion: "1.0"
CurrentVersionCode: 1
